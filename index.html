    <style>
        @media print {

                display: block; 
                width: 100%;

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

            Warning: (props) => <Icon {...props} path={<React.Fragment><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></React.Fragment>} />
        };

        const LISTA_PADRAO = [
            "751-02 — SMB - GO", "751-05 — F RVD - GO", "751-06 — IPR - GO", "751-07 — F TRD - GO",
            "751-08 — F GYN - GO", "751-10 — F ANP - GO", "751-14 — F APG - GO",
            "751-18 — F CTL - GO", "751-24 — F GYN 02 - GO", "751-25 — F SEN - GO",
            "751-26 — GYN 05 - GO", "760-00 — F GYN 04 - GO",
            "752-00 — F PDR - GO", "759-00 — F PON - GO", "762-00 — F GYN 03 - GO",
            "783-00 — F QUI-GO",
            "782-00 — F CRX - GO", "758-00 — F JRG - GO"
        ];

        const playErrorSound = () => {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gain = context.createGain();
                oscillator.connect(gain);
                gain.connect(context.destination);
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(150, context.currentTime);
                gain.gain.setValueAtTime(0.1, context.currentTime);
                oscillator.start();
                oscillator.stop(context.currentTime + 0.3);
            } catch (e) { console.warn("Erro de som:", e); }
        };

        const formatDateToPTBR = (isoDate) => {
            if (!isoDate) return '';
            const [y, m, d] = isoDate.split('-');
            return `${d}/${m}/${y}`;
        };

        const getTodayISO = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // ===============================================================
        // 🔧 FUNÇÃO CORRIGIDA: Aguarda TODOS os QRCodes carregarem antes de imprimir
        // O bug "imprime só 1 página de 4" acontece porque window.print() é chamado
        // antes do React+QRious terminarem de renderizar todas as etiquetas no DOM.
        // ===============================================================
        const aguardarEImprimir = (qtdEtiquetas, callback) => {
            // Tempo proporcional: mínimo 800ms + 30ms por etiqueta extra
            // Garante que mesmo 100+ etiquetas tenham tempo de renderizar
            const tempoBase = 800;
            const tempoExtra = qtdEtiquetas * 30;
            const tempoTotal = tempoBase + tempoExtra;

            // Dupla requisição de frame garante que o React renderizou
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        // Verifica se todos os canvas (QRCodes) foram renderizados
                        const canvases = document.querySelectorAll('#area-impressao-etiquetas canvas');
                        const labels = document.querySelectorAll('#area-impressao-etiquetas .label-card');
                        
                        console.log(`Imprimindo: ${labels.length} etiquetas com ${canvases.length} QRCodes renderizados`);
                        
                        window.print();
                        if (callback) setTimeout(callback, 1500);
                    }, tempoTotal);
                });
            });
        };

        const QRCodeImage = React.memo(({ text, size = 100 }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (window.QRious && canvasRef.current) {
                    new window.QRious({ element: canvasRef.current, value: text, size: size, level: 'M' });
                }
            }, [text, size]);
            return <canvas ref={canvasRef} width={size} height={size} style={{ width: '100%', height: 'auto' }} />;
        });

        const CustomDialog = ({ dialog, closeDialog }) => {
            if (!dialog.isOpen) return null;

            const [inputValue, setInputValue] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                if (dialog.isOpen && dialog.type === 'prompt' && inputRef.current) {
                    setTimeout(() => inputRef.current.focus(), 100);
                }
            }, [dialog.isOpen, dialog.type]);

            const handleConfirm = () => {
                if (dialog.type === 'prompt') {
                    if (dialog.onConfirm) dialog.onConfirm(inputValue);
                } else if (dialog.onConfirm) {
                    dialog.onConfirm();
                } else {
                    closeDialog();
                }
                setInputValue('');
            };

            const handleCancel = () => {
                if (dialog.onCancel) dialog.onCancel();
                closeDialog();
                setInputValue('');
            };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-in zoom-in duration-200">
                        <div className="flex items-center gap-3 mb-4">
                            {dialog.type === 'alert' && <Icons.Warning className="w-6 h-6 text-orange-500" />}
                            {dialog.type === 'confirm' && <Icons.CheckSquare className="w-6 h-6 text-blue-500" />}
                            {dialog.type === 'prompt' && <Icons.Settings className="w-6 h-6 text-indigo-500" />}
                            <h3 className="text-lg font-black text-slate-800 uppercase tracking-tight">{dialog.title || 'Aviso'}</h3>
                        </div>
                        
                        <p className="text-sm text-slate-600 mb-6 whitespace-pre-wrap font-medium">{dialog.message}</p>

                        {dialog.type === 'prompt' && (
                            <input
                                ref={inputRef}
                                type="password"
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 mb-6 focus:border-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-100 transition shadow-sm"
                                placeholder="Digite a senha..."
                                onKeyDown={(e) => e.key === 'Enter' && handleConfirm()}
                            />
                        )}

                        <div className="flex justify-end gap-3">
                            {dialog.type !== 'alert' && (
                                <button onClick={handleCancel} className="px-5 py-2.5 rounded-xl text-slate-600 hover:bg-slate-100 font-bold text-sm transition">
                                    Cancelar
                                </button>
                            )}
                            <button onClick={handleConfirm} className="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm transition shadow-md hover:shadow-lg active:scale-95">
                                Confirmar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            // Estado do Balão JMS
            const [showJMSWarning, setShowJMSWarning] = useState(true);

            // Estado do Modal Personalizado
            const [dialog, setDialog] = useState({ isOpen: false });

            // Funções auxiliares para invocar o Modal
            const closeDialog = () => setDialog({ isOpen: false });
            
            const showAlert = (message, title = "Aviso") => {
                setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: closeDialog });
            };
            
            const showConfirm = (message, onConfirmCallback, title = "Confirmação") => {
                setDialog({ 
                    isOpen: true, type: 'confirm', title, message, 
                    onConfirm: () => { closeDialog(); onConfirmCallback(); }
                });
            };

            const showPrompt = (message, onConfirmCallback, title = "Acesso Restrito") => {
                setDialog({ 
                    isOpen: true, type: 'prompt', title, message, 
                    onConfirm: (val) => { closeDialog(); onConfirmCallback(val); }
                });
            };

            const [activeTab, setActiveTab] = useState('operacao');
            const [listaBases, setListaBases] = useState(LISTA_PADRAO);
            const [basesExtras, setBasesExtras] = useState([]); 

            const [isAdminUnlocked, setIsAdminUnlocked] = useState(false);
            const [novaBaseAdmin, setNovaBaseAdmin] = useState('');

            const [lotes, setLotes] = useState([]);
            const [dbConnected, setDbConnected] = useState(false);
            const [isLoadingData, setIsLoadingData] = useState(true);

            const [deletingIds, setDeletingIds] = useState(new Set());

            const [modoEntrada, setModoEntrada] = useState('scanner');
            const loteInputRef = useRef(null);
            const lotesMassaRef = useRef(null);
            
            const [novaBase, setNovaBase] = useState('');
            const [novoPeriodo, setNovoPeriodo] = useState('Manhã'); 

            const [basesSelecionadas, setBasesSelecionadas] = useState(new Set()); 
            const [periodoImpressao, setPeriodoImpressao] = useState('Todos'); 
            const [lotesParaImprimir, setLotesParaImprimir] = useState([]);
            const [selectedIds, setSelectedIds] = useState(new Set()); 
            const [dataImpressaoMassa, setDataImpressaoMassa] = useState(getTodayISO());

            const [filtroTexto, setFiltroTexto] = useState('');
            const [filtroBase, setFiltroBase] = useState('');
            const [filtroStatus, setFiltroStatus] = useState('todos');
            const [dataInicio, setDataInicio] = useState('');
            const [dataFim, setDataFim] = useState('');

            const [pendenteBuscaLote, setPendenteBuscaLote] = useState('');
            const [pendenteBuscaBase, setPendenteBuscaBase] = useState('');
            
            const [processadosDataFiltro, setProcessadosDataFiltro] = useState(getTodayISO());
            const [processadoBusca, setProcessadoBusca] = useState('');
            const [processadoBaseFiltro, setProcessadoBaseFiltro] = useState(''); 
            const [dataParaMover, setDataParaMover] = useState('');
            const [baseParaAlterar, setBaseParaAlterar] = useState('');

            const [dataMonitoramento, setDataMonitoramento] = useState(getTodayISO());
            
            const [modoConsulta, setModoConsulta] = useState('simples');
            const [consultaTermo, setConsultaTermo] = useState('');
            const [consultaMassaTexto, setConsultaMassaTexto] = useState('');

            const [now, setNow] = useState(Date.now());

            const SENHA_MESTRA = "JT@2026";
            const isBaseValida = useCallback((base) => listaBases.includes(base), [listaBases]);

            const lastBaseStatusRef = useRef(true);

            useEffect(() => {
                const isValid = isBaseValida(novaBase);
                if (novaBase && !isValid && lastBaseStatusRef.current === true) {
                    playErrorSound();
                }
                lastBaseStatusRef.current = !novaBase || isValid;
            }, [novaBase, isBaseValida]);

            useEffect(() => {
                if (deletingIds.size > 0) {
                    setDeletingIds(prev => {
                        const next = new Set(prev);
                        let changed = false;
                        next.forEach(id => {
                            if (!lotes.some(l => l.id === id)) {
                                next.delete(id);
                                changed = true;
                            }
                        });
                        return changed ? next : prev;
                    });
                }
            }, [lotes]);

            const handleTabClick = (key) => {
                if (key === 'admin') {
                    if (!isAdminUnlocked) {
                        showPrompt("Acesso Administrativo Restrito. Digite a senha:", (pass) => {
                            if (pass === SENHA_MESTRA) {
                                setIsAdminUnlocked(true);
                                setActiveTab(key);
                            } else {
                                showAlert("Senha Incorreta!", "Erro");
                            }
                        });
                    } else {
                        setActiveTab(key);
                    }
                } else {
                    setActiveTab(key);
                }
            };

            const toggleBaseImpressao = (base) => {
                const newSet = new Set(basesSelecionadas);
                if (newSet.has(base)) newSet.delete(base);
                else newSet.add(base);
                setBasesSelecionadas(newSet);
            };

            const lotesFiltradosRelatorio = useMemo(() => {

                    if (filtroStatus !== 'todos' && lote.status !== filtroStatus) return false;
                    if (filtroBase !== "" && lote.baseSegmento !== filtroBase) return false;
                    if (upperFiltroTexto && !lote.codigo.includes(upperFiltroTexto)) return false;

                    if (hasDateFilter) {
                        let loteISO = "";
                        if (lote.timestampCriacao) {
                            const d = new Date(lote.timestampCriacao);
                            loteISO = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                        } else if (lote.dataCriacao) {
                            const parts = lote.dataCriacao.split('/');
                            if (parts.length === 3) loteISO = `${parts[2]}-${parts[1]}-${parts[0]}`;
                        }
                        
                        if (!loteISO) return false;
                        if (dataInicio && loteISO < dataInicio) return false;
                        if (dataFim && loteISO > dataFim) return false;
                    }
                    return true;
                });

                lotesDoDia.forEach(l => {

                    else agrupamento[l.baseSegmento] = (agrupamento[l.baseSegmento] || 0) + 1;
                });
                return Object.entries(agrupamento)

                                                                <div key={i} className="flex flex-col sm:flex-row sm:gap-4 text-xs items-start sm:items-center relative">
                                                                    <div className="absolute w-2 h-2 bg-slate-300 rounded-full -left-[13px] top-1.5 sm:top-auto border-2 border-white"></div>
                                                                    <span className="text-slate-400 font-mono font-bold whitespace-nowrap mb-1 sm:mb-0 text-[10px]">{h.data}</span>
                                                                    <span className="font-black uppercase tracking-widest text-slate-700 px-2 py-0.5 bg-slate-100 rounded text-[10px]">{h.status}</span>
                                                                    <span className="text-slate-500 font-medium italic text-[11px] mt-1 sm:mt-0">{h.detalhe}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    ) : (
                                        lotesConsulta.length > 0 && (
                                            <div className="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden animate-in fade-in duration-300">
                                                <div className="p-6 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                                                    <h3 className="font-black text-slate-700 uppercase tracking-widest text-sm flex items-center gap-2">
                                                        <Icons.List className="text-indigo-500 w-5 h-5"/> Resultados em Massa ({lotesConsulta.length})
                                                    </h3>
                                                    <div className="flex flex-wrap gap-2">
                                                        <button onClick={() => exportarCSV(lotesConsulta)} className="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition shadow"><Icons.FileText className="w-3 h-3"/> CSV</button>
                                                        <button onClick={() => exportarExcel(lotesConsulta)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition shadow"><Icons.List className="w-3 h-3"/> EXCEL</button>
                                                        <button onClick={() => exportarPDF(lotesConsulta)} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition shadow"><Icons.Download className="w-3 h-3"/> PDF</button>
                                                        <div className="w-px h-6 bg-slate-300 mx-2 hidden md:block"></div>
                                                        <button onClick={excluirLotesEmMassaConsulta} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest flex items-center gap-2 transition shadow-md"><Icons.Trash2 className="w-3 h-3"/> EXCLUIR TODOS OS {lotesConsulta.length}</button>
                                                    </div>
                                                </div>
                                                <div className="overflow-x-auto max-h-[600px] custom-scrollbar">
                                                    <table className="w-full text-xs text-left">
                                                        <thead className="bg-slate-100/50 border-b border-slate-200 font-black text-slate-500 uppercase tracking-widest sticky top-0 z-10 backdrop-blur-sm">
                                                            <tr>
                                                                <th className="p-4 whitespace-nowrap">Lote</th>
                                                                <th className="p-4 whitespace-nowrap">Base</th>
                                                                <th className="p-4 whitespace-nowrap">Data / Hora</th>
                                                                <th className="p-4 whitespace-nowrap">Status</th>
                                                                <th className="p-4 text-right whitespace-nowrap">Ação</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {lotesConsulta.map(l=>(
                                                                <tr key={l.id} className="hover:bg-indigo-50/30 transition-colors">
                                                                    <td className="p-4 font-black font-mono text-sm uppercase tracking-wider text-indigo-900 whitespace-nowrap">{l.codigo}</td>
                                                                    <td className="p-4 font-bold uppercase text-slate-500 text-[10px] tracking-widest whitespace-nowrap">{l.baseSegmento}</td>
                                                                    <td className="p-4 font-semibold text-slate-600 whitespace-nowrap">{l.dataCriacao} - {l.horaCriacao}</td>
                                                                    <td className="p-4">
                                                                        <span className={`px-2.5 py-1 rounded-md text-[9px] font-black uppercase tracking-widest ${l.status==='pendente'?'bg-amber-100 text-amber-700':l.status==='em_uso'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'}`}>
                                                                            {l.status}
                                                                        </span>
                                                                    </td>
                                                                    <td className="p-4 text-right">
                                                                        <button onClick={()=>removerLote(l.id)} className="text-rose-400 hover:text-white hover:bg-rose-500 p-2 rounded-lg bg-rose-50 transition-colors"><Icons.Trash2 className="w-4 h-4"/></button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )
                                    )}
                                </div>
                            </div>
                        )}

                        {}
                        {activeTab === 'admin' && (
                            <div className="max-w-4xl mx-auto space-y-6 animate-in slide-in-from-bottom-4 duration-300">
                                <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-slate-100">
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-5 mb-8 pb-6 border-b border-slate-100">
                                        <div className="bg-indigo-100 p-4 rounded-2xl shadow-inner"><Icons.Settings className="w-8 h-8 text-indigo-600"/></div>
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Gestão de Bases</h2>
                                            <p className="text-sm text-slate-500 mt-2 font-medium">Adicione novas bases para expandir o sistema dinamicamente.</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-6 md:p-8 rounded-2xl border border-slate-200 mb-10 shadow-inner">
                                        <h3 className="text-xs font-black text-slate-600 uppercase tracking-widest mb-5">Adicionar Nova Base</h3>
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <input value={novaBaseAdmin} onChange={(e) => setNovaBaseAdmin(e.target.value)} placeholder="EX: 799-00 — NOVA BASE - UF" className="flex-1 border-2 border-slate-300 rounded-xl px-5 py-4 uppercase font-black focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none text-sm placeholder:text-slate-400 bg-white" />
                                            <button onClick={adicionarNovaBaseAdmin} className="bg-indigo-600 text-white font-black px-10 py-4 rounded-xl hover:bg-indigo-700 shadow-lg hover:shadow-xl transition-all uppercase text-xs tracking-widest active:scale-95">Salvar Base</button>
                                        </div>
                                        <p className="text-[10px] text-slate-400 mt-3 font-bold uppercase tracking-widest flex items-center gap-2">Padrão Sugerido: <span className="font-mono bg-white px-2 py-1 border rounded-md text-slate-600 shadow-sm">CODIGO — NOME - UF</span></p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                                        <div>
                                            <h3 className="font-black text-slate-800 mb-5 text-sm uppercase flex items-center justify-between border-b-2 border-slate-100 pb-3 tracking-widest">
                                                Personalizadas <span className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full text-[10px] shadow-sm">{basesExtras.length}</span>
                                            </h3>
                                            {basesExtras.length === 0 ? (
                                                <div className="text-center p-10 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 text-xs font-bold uppercase tracking-widest bg-slate-50/50">Nenhuma base extra adicionada.</div>
                                            ) : (
                                                <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                                    {basesExtras.map(b => (
                                                        <div key={b.id} className="flex justify-between items-center p-4 border-2 border-slate-100 rounded-xl bg-white shadow-sm hover:border-indigo-300 transition-all group">
                                                            <span className="font-black text-[11px] uppercase text-slate-700 tracking-wider">{b.nome}</span>
                                                            <button onClick={() => removerBaseExtraAdmin(b.id, b.nome)} className="text-rose-300 hover:text-white hover:bg-rose-500 p-2 rounded-lg transition-colors shadow-sm bg-rose-50" title="Remover Base"><Icons.Trash2 className="w-4 h-4" /></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div>
                                            <h3 className="font-black text-slate-800 mb-5 text-sm uppercase flex items-center justify-between border-b-2 border-slate-100 pb-3 tracking-widest">
                                                Padrão do Sistema <span className="bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-[10px] shadow-sm">{LISTA_PADRAO.length}</span>
                                            </h3>
                                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner">
                                                <div className="grid grid-cols-1 gap-2 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                                                    {LISTA_PADRAO.map(b => (
                                                        <div key={b} className="text-[10px] font-black tracking-widest text-slate-500 bg-white border border-slate-200 px-4 py-3 rounded-lg shadow-sm truncate">{b}</div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {/* ÁREA DE IMPRESSÃO OCULTA */}
                    <div id="area-impressao-etiquetas">
                        {Object.entries(
                            lotesParaImprimir.reduce((acc, l) => {
                                if (!acc[l.baseSegmento]) acc[l.baseSegmento] = [];
                                acc[l.baseSegmento].push(l);
                                return acc;
                            }, {})
                        ).map(([base, groupLotes]) => (
                            <div key={base} className="print-group">
                                {groupLotes.map(l => {
                                    const p = l.baseSegmento.split('—');
                                    return (
                                        <div key={l.id} className="label-card">
                                            <div className="label-header">
                                                <div><span className="header-title">SEGMENTO</span><div className="header-value">{p[0]||'GERAL'}</div></div>
                                                <div><span className="header-title">BASE</span><div className="header-value">{p[1]||l.baseSegmento}</div></div>
                                            </div>
                                            <div className="label-content">
                                                <div style={{width:'80px',height:'80px'}}><QRCodeImage text={l.codigo} size={80}/></div>
                                                <div className="label-text">{l.codigo}</div>
                                            </div>
                                            <div className="label-footer">
                                                <div className="footer-title">EXPEDIÇÃO</div>
                                                <div className="check-item"><span className="check-box"></span> CONFERIDO</div>
                                                <div className="footer-inputs"><span>{l.dataCriacao}</span><span>{l.horaCriacao}</span></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
